name: Deploy VitePress

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build VitePress
        run: npm run build

      - name: 📂 Verify Build Output
        run: |
          echo "Contents of docs/.vitepress/dist:"
          ls -lah docs/.vitepress/dist

      - name: 🔑 Start SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRIVATE_KEY }}

      - name: 🛡️ Add Server to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.PORT }} ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy to Server
        run: |
          rsync -avzr \
            -e "ssh -p ${{ secrets.PORT }} -o StrictHostKeyChecking=yes" \
            docs/.vitepress/dist/ \
            "${{ secrets.USERNAME }}@${{ secrets.HOST }}:${{ secrets.DIRECTORY }}/dist/"

      - name: ✅ Deployment Finished
        run: echo "Deployment completed successfully."
